services:
  postgres:
    image: postgres:16
    container_name: zpo-app-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: zpo_app
      POSTGRES_USER: zpo_user
      POSTGRES_PASSWORD: zpo_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zpo_user -d zpo_app"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
