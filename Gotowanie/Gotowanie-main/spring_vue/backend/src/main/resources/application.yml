spring:
  application:
    name: zpo-app

  datasource:
    url: jdbc:postgresql://localhost:5432/zpo_app
    username: zpo_user
    password: zpo_password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  sql:
    init:
      mode: never

server:
  port: 8080

# Application-specific configuration.
# JWT secret MUST be at least 32 bytes for HS256. Override via environment variable
# APP_SECURITY_JWT_SECRET in real deployments.
app:
  security:
    jwt:
      secret: ${APP_SECURITY_JWT_SECRET:zpo-app-dev-secret-change-me-in-production-0123456789}
      # Access token lifetime in milliseconds (default: 24h)
      expiration-ms: 86400000
      issuer: zpo-app
  cors:
    # Comma-separated origins allowed to call the API from a browser (the Vite dev server).
    allowed-origins: http://localhost:5173,http://127.0.0.1:5173
  seed:
    # When true, the DataInitializer inserts demo users, resources and requests on startup
    # and resets resources/requests when the active preset no longer matches stored metadata.
    enabled: true

# OpenAPI / Swagger UI
springdoc:
  swagger-ui:
    path: /swagger-ui/index.html
    operations-sorter: method
    tags-sorter: alpha
  api-docs:
    path: /v3/api-docs

logging:
  level:
    org.hibernate.SQL: debug
    pl.zpo.app: debug
