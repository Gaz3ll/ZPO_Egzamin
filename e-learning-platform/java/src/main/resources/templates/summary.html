<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quiz Summary</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: auto; padding: 20px; text-align: center; }
        .result { padding: 30px; border-radius: 10px; margin: 20px 0; }
        .passed { background: #d4edda; border: 1px solid #c3e6cb; }
        .failed { background: #f8d7da; border: 1px solid #f5c6cb; }
        .score { font-size: 48px; font-weight: bold; }
        .label { font-size: 24px; margin: 10px 0; }
        .details { margin-top: 20px; font-size: 16px; }
        a { display: inline-block; margin-top: 20px; color: #007bff; text-decoration: none; }
    </style>
</head>
<body>
    <div class="result" th:classappend="${result.passed} ? 'passed' : 'failed'">
        <div class="score" th:text="${#numbers.formatDecimal(result.percentage, 0, 1)} + '%'"></div>
        <div class="label" th:text="${result.passed} ? 'PASSED' : 'FAILED'"></div>
        <div class="details">
            <p>Score: <span th:text="${#numbers.formatDecimal(result.score, 0, 1)}"></span> / <span th:text="${result.total}"></span></p>
            <p>Correct: <span th:text="${result.correct}"></span> | Wrong: <span th:text="${result.wrong}"></span> | Total: <span th:text="${result.total}"></span></p>
        </div>
    </div>
    <a href="/quiz">Try Again</a>
</body>
</html>
