<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>All Results</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: auto; padding: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background: #f2f2f2; }
        .passed { color: green; }
        .failed { color: red; }
    </style>
</head>
<body>
    <h1>All Student Results</h1>
    <table>
        <thead>
            <tr><th>User</th><th>Score</th><th>Percentage</th><th>Status</th></tr>
        </thead>
        <tbody>
            <tr th:each="r : ${results}">
                <td th:text="${r.userId}"></td>
                <td th:text="${#numbers.formatDecimal(r.score, 0, 1)}"></td>
                <td th:text="${#numbers.formatDecimal(r.percentage, 0, 1)} + '%'"></td>
                <td th:text="${r.passed} ? 'Passed' : 'Failed'" th:class="${r.passed} ? 'passed' : 'failed'"></td>
            </tr>
        </tbody>
    </table>
    <p><a href="/quiz">Back to Quiz</a></p>
</body>
</html>
