<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quiz - Platforma E-learningowa</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        :root {
            --bg-color: #0b0f19;
            --card-bg: rgba(22, 30, 49, 0.7);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-primary: #f3f4f6;
            --text-secondary: #9ca3af;
            --primary-gradient: linear-gradient(135deg, #6366f1, #8b5cf6);
            --primary-color: #6366f1;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            box-sizing: border-box;
        }
        .container {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 35px;
            width: 100%;
            max-width: 650px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }
        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-top: 0;
            margin-bottom: 30px;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
        }
        .question {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            transition: transform 0.2s ease, border-color 0.2s ease;
        }
        .question:hover {
            border-color: rgba(99, 102, 241, 0.4);
            transform: translateY(-2px);
        }
        .question h3 {
            margin-top: 0;
            margin-bottom: 15px;
            font-size: 16px;
            font-weight: 600;
            color: #fff;
        }
        label {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            margin: 8px 0;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 14px;
        }
        label:hover {
            background: rgba(99, 102, 241, 0.05);
            border-color: rgba(99, 102, 241, 0.3);
        }
        input[type="radio"] {
            margin-right: 12px;
            accent-color: var(--primary-color);
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
        button {
            width: 100%;
            background: var(--primary-gradient);
            color: white;
            font-weight: 600;
            font-size: 16px;
            padding: 14px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
            transition: all 0.2s ease;
            margin-top: 10px;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.4);
        }
        button:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Rozwiąż Quiz</h1>
        <form action="#" th:action="@{/quiz/submit}" method="post">
            <div th:each="q : ${questions}" class="question">
                <h3><span th:text="${q.id}"></span>. <span th:text="${q.content}"></span></h3>
                <label><input type="radio" th:name="${q.id}" value="A"> <span th:text="${q.optionA}">A</span></label>
                <label><input type="radio" th:name="${q.id}" value="B"> <span th:text="${q.optionB}">B</span></label>
                <label><input type="radio" th:name="${q.id}" value="C"> <span th:text="${q.optionC}">C</span></label>
                <label><input type="radio" th:name="${q.id}" value="D"> <span th:text="${q.optionD}">D</span></label>
            </div>
            <button type="submit">Prześlij Quiz</button>
        </form>
    </div>
</body>
</html>
