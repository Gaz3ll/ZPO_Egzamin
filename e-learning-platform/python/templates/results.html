<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>All Results</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: auto; padding: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background: #f2f2f2; }
        .passed { color: green; }
        .failed { color: red; }
    </style>
</head>
<body>
    <h1>All Student Results</h1>
    <table>
        <thead>
            <tr><th>User</th><th>Score</th><th>Percentage</th><th>Status</th></tr>
        </thead>
        <tbody>
            {% for r in results %}
            <tr>
                <td>{{ r.user_id }}</td>
                <td>{{ "%.1f"|format(r.score) }}</td>
                <td>{{ "%.1f"|format(r.percentage) }}%</td>
                <td class="{{ 'passed' if r.passed else 'failed' }}">{{ 'Passed' if r.passed else 'Failed' }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    <p><a href="/quiz">Back to Quiz</a></p>
</body>
</html>
