<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Wszystkie Wyniki - Platforma E-learningowa</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        :root {
            --bg-color: #0b0f19;
            --card-bg: rgba(22, 30, 49, 0.7);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-primary: #f3f4f6;
            --text-secondary: #9ca3af;
            --primary-gradient: linear-gradient(135deg, #6366f1, #8b5cf6);
            --success-color: #10b981;
            --fail-color: #ef4444;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            box-sizing: border-box;
        }
        .container {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 35px;
            width: 100%;
            max-width: 800px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }
        h1 {
            font-size: 26px;
            font-weight: 700;
            margin-top: 0;
            margin-bottom: 25px;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
        }
        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            margin-bottom: 25px;
        }
        th {
            background: rgba(255, 255, 255, 0.03);
            font-weight: 600;
            text-align: left;
            padding: 14px 16px;
            color: #fff;
            border-bottom: 1px solid var(--border-color);
            font-size: 14px;
        }
        td {
            padding: 14px 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            color: var(--text-secondary);
            font-size: 14px;
        }
        tr:hover td {
            background: rgba(255, 255, 255, 0.01);
            color: #fff;
        }
        tr:last-child td {
            border-bottom: none;
        }
        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        .badge.passed {
            background: rgba(16, 185, 129, 0.15);
            color: var(--success-color);
            border: 1px solid rgba(16, 185, 129, 0.3);
        }
        .badge.failed {
            background: rgba(239, 68, 68, 0.15);
            color: var(--fail-color);
            border: 1px solid rgba(239, 68, 68, 0.3);
        }
        .btn-back {
            display: inline-block;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            font-weight: 500;
            font-size: 14px;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            transition: all 0.2s ease;
        }
        .btn-back:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateX(-2px);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Wszystkie Wyniki Studentów</h1>
        <table>
            <thead>
                <tr>
                    <th>Student</th>
                    <th>Uzyskany wynik</th>
                    <th>Procenty</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody>
                {% for r in results %}
                <tr>
                    <td style="font-weight: 500; color: #fff;">{{ r.user_id }}</td>
                    <td>{{ "%.1f"|format(r.score) }} pkt</td>
                    <td>{{ "%.1f"|format(r.percentage) }}%</td>
                    <td>
                        <span class="badge {% if r.passed %}passed{% else %}failed{% endif %}">
                            {% if r.passed %}Zaliczone{% else %}Niezaliczone{% endif %}
                        </span>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        <a href="/quiz" class="btn-back">← Wróć do Quizu</a>
    </div>
</body>
</html>
