<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Quiz</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: auto; padding: 20px; }
        .question { border: 1px solid #ddd; padding: 15px; margin: 10px 0; border-radius: 5px; }
        .question h3 { margin-top: 0; }
        label { display: block; margin: 5px 0; }
        button { background: #4CAF50; color: white; padding: 12px 24px; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; }
        button:hover { background: #45a049; }
    </style>
</head>
<body>
    <h1>Quiz</h1>
    <form action="/quiz/submit" method="post">
        {% for q in questions %}
        <div class="question">
            <h3>{{ q.id }}. {{ q.content }}</h3>
            <label><input type="radio" name="{{ q.id }}" value="A"> {{ q.option_a }}</label>
            <label><input type="radio" name="{{ q.id }}" value="B"> {{ q.option_b }}</label>
            <label><input type="radio" name="{{ q.id }}" value="C"> {{ q.option_c }}</label>
            <label><input type="radio" name="{{ q.id }}" value="D"> {{ q.option_d }}</label>
        </div>
        {% endfor %}
        <button type="submit">Submit Quiz</button>
    </form>
</body>
</html>
